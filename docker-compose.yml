services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    image: sd-character-viewer:latest
    ports:
      - "3000:3000"
    environment:
      NODE_ENV: production
      PORT: 3000
      SD_IMAGES_ROOT: /data
      SD_PASSWORD: ${SD_PASSWORD:-}
      SD_PASSWORD_SALT: ${SD_PASSWORD_SALT:-}
    volumes:
      - ${SD_IMAGES_HOST_PATH:-./images}:/data:ro
    restart: unless-stopped